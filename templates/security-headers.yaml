id:          security-headers
name:        Missing Security Headers
severity:    medium
description: |
  Checks every crawled endpoint for the four required security headers.
  Reports the endpoint with the most missing headers plus a per-header
  breakdown showing every affected URL.

module:      SecurityHeadersModule

max_endpoints: 0
crawl_depth:   3

headers:
  - name: Strict-Transport-Security
    severity: medium

  - name: X-Frame-Options
    severity: medium

  - name: X-Content-Type-Options
    severity: medium

  - name: Content-Security-Policy
    severity: medium

tags:
  - headers
  - hardening
  - owasp-a05