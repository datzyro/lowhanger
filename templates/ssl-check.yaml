id:          ssl-check
name:        Deprecated TLS Version Offered
severity:    medium
description: |
  Checks whether TLS 1.0 or TLS 1.1 are offered by the server.

  A finding is raised ONLY when testssl.sh reports:
    TLS 1    offered (deprecated)
    TLS 1.1  offered (deprecated)

  Any other output for those entries is ignored.
  No other testssl.sh findings are processed by this module.

  Without testssl.sh, a direct Python TLS handshake is attempted for
  each version. A finding is raised only if the handshake completes
  (i.e. the server accepted the connection at that version).

module:      SslCheckModule

# Path to testssl.sh binary. Leave empty to auto-detect from PATH.
testssl_path: ""

remediation: |
  Disable TLS 1.0 and TLS 1.1 at the server level.
  Configure TLS 1.2 and TLS 1.3 only.

  nginx:   ssl_protocols TLSv1.2 TLSv1.3;
  Apache:  SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
  IIS:     Disable via registry or IIS Crypto tool

tags:
  - ssl
  - tls
  - deprecated
  - owasp-a02